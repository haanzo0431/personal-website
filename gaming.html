    <style>
        /* --- GAMING WHEEL STYLES --- */
        .gaming-container {
            display: flex;
            align-items: center;
            gap: 3rem;
            height: 350px;
            margin-top: 2rem;
            perspective: 1000px; /* Gives the 3D curve depth */
        }

        /* The Left Side: The Wheel */
        .wheel-picker {
            position: relative;
            width: 40%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 2px solid rgba(0, 0, 0, 0.1);
        }

        /* The Middle Indicator Line */
        .wheel-indicator {
            position: absolute;
            right: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background-color: var(--text-main);
            border-radius: 4px;
            z-index: 10;
        }

        .wheel-item {
            position: absolute;
            right: 2rem;
            width: 100%;
            text-align: right;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-muted);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
            pointer-events: none;
            transform-origin: right center;
        }

        /* The 3 Visible States */
        .wheel-item.active {
            opacity: 1;
            transform: translateY(0) scale(1.1);
            filter: blur(0);
            color: var(--text-main);
            pointer-events: auto;
        }

        .wheel-item.prev {
            opacity: 0.4;
            transform: translateY(-60px) scale(0.9) rotateX(25deg);
            filter: blur(3px);
            pointer-events: auto;
            cursor: pointer;
        }

        .wheel-item.next {
            opacity: 0.4;
            transform: translateY(60px) scale(0.9) rotateX(-25deg);
            filter: blur(3px);
            pointer-events: auto;
            cursor: pointer;
        }

        /* The Right Side: Game Details */
        .game-info-panel {
            width: 60%;
            display: flex;
            flex-direction: column;
        }

        .info-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            transition: opacity 0.3s ease;
        }

        .info-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-rating {
            font-weight: 600;
            color: var(--text-main);
        }

        .info-summary {
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.6;
            transition: opacity 0.3s ease;
        }

        @media (max-width: 600px) {
            .gaming-container {
                flex-direction: column;
                height: auto;
                gap: 2rem;
            }
            .wheel-picker {
                width: 100%;
                height: 250px;
                border-right: none;
                border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            }
            .wheel-indicator {
                top: auto;
                bottom: -2px;
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                width: 24px;
                height: 3px;
            }
            .wheel-item {
                right: 0;
                text-align: center;
                transform-origin: center bottom;
            }
            .game-info-panel { width: 100%; }
        }
    </style>
</head>
